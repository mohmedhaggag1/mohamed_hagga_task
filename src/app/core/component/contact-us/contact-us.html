<div class="contact-card border rounded-4 p-3 bg-white">
    <div class="row align-items-center  g-3">
        <div class="col-md-4">
            <img [src]="contactData.image" alt="contact" class="contact-image w-100 rounded-3">
        </div>

        <div class="col-md-8 text-start">

            <p class="title fw-bold mb-2 fs-22">
                {{ contactData.title }}
            </p>

            <p class="text-secondary mb-3 fs-14">
                {{ contactData.description }}
            </p>

            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-outline-dark contact-btn">
                    <img src="/images/contact-us/phone-fill.png" width="20">
                    {{contactData.phone}}
                </button>
                
                <contact-us-btn />
                
            </div>
        </div>
    </div>
</div>
